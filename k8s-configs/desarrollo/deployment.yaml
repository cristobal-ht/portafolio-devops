apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-sitio-deployment
  namespace: desarrollo        
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mi-sitio
  template:
    metadata:
      labels:
        app: mi-sitio
    spec:
      containers:
      - name: python-contenedor
        image: paginaweb:1.0 
        imagePullPolicy: Always 
        ports:
        - containerPort: 8080 
        
        envFrom:
        - configMapRef:
            name: app-config   
---
apiVersion: v1
kind: Service
metadata:
  name: mi-sitio-service
  namespace: desarrollo       
spec:
  selector:
    app: mi-sitio
  ports:
    - protocol: TCP
      port: 8080      
      targetPort: 8080