<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cristóbal Hernández | Cloud & DevOps Engineer</title>

    <!-- Google Fonts: Syne para títulos, DM Sans para cuerpo, JetBrains Mono para código -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 para grilla y componentes base -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Devicons: íconos de tecnologías (Docker, Kubernetes, GitHub, etc.) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

    <!-- CSS principal del sitio -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>

    <!-- ============================================================
         NAVBAR: Barra de navegación fija en la parte superior
    ============================================================ -->
    <nav class="navbar navbar-expand-lg fixed-top" id="mainNav">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand" href="{{ url_for('home') }}">
                <span class="brand-ch">CH</span>
                <span class="brand-sep">|</span>
                <span class="brand-title">Devops</span>
            </a>

            <!-- Botón hamburguesa para móviles -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links de navegación -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" href="{{ url_for('home') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'proyectos' %}active{% endif %}" href="{{ url_for('proyectos') }}">Proyectos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'stack' %}active{% endif %}" href="{{ url_for('stack') }}">Stack</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'blog' %}active{% endif %}" href="{{ url_for('blog') }}">Blog</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'about' %}active{% endif %}" href="{{ url_for('about') }}">Sobre Mí</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ============================================================
         CONTENIDO PRINCIPAL: Cada página inyecta su HTML aquí
    ============================================================ -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- ============================================================
         FOOTER
    ============================================================ -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-inner">
                <span class="footer-name">Cristóbal Hernández</span>
                <span class="footer-sep">·</span>
                <span class="footer-role">Cloud & DevOps Engineer</span>
            </div>
            <div class="footer-links">
                <a href="https://www.linkedin.com/in/crist%C3%B3bal-hern%C3%A1ndez-56460b272/" target="_blank" title="LinkedIn">
                    <i class="devicon-linkedin-plain"></i>
                </a>
                <a href="https://github.com/cristobal-ht" target="_blank" title="GitHub">
                    <i class="devicon-github-original colored"></i>
                </a>
                <a href="mailto:cristobal.hernandez.777@gmail.com" title="Email"></a>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2zm13 2.383-4.758 2.855L15 11.114V5.383zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741zM1 11.114l4.758-2.876L1 5.383v5.731z"/>
                    </svg>
                </a>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Animaciones de scroll y navbar -->
    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        window.addEventListener('scroll', () => {
            document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 50);
        });
    </script>
